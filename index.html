<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alain Dzaul Contreras Olea - Software Quality Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header / Profile Section -->
        <header class="profile-section">
            <div class="profile-image-container">
                <img src="/public/images/profile-picture.png" alt="Alain Dzaul Contreras Olea" class="profile-image">
            </div>
            <div class="profile-info">
                <h1 class="name">Alain Dzaul Contreras Olea</h1>
                <p class="title" id="job-title">Quality Assurance Engineering</p>
                <div class="contact-icons">
                    <div class="icon-button" onclick="copyToClipboard('Alaindcontreras@gmail.com', 'Email copiado')" title="Email">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="icon-button" onclick="copyToClipboard('+52 55 5105 6694', 'Teléfono copiado')" title="Teléfono">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="icon-button" onclick="window.open('https://www.linkedin.com/in/alain-contreras-olea-b39992115/', '_blank')" title="LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </div>
                    <div class="icon-button" onclick="downloadResume()" title="Descargar CV">
                        <i class="fas fa-download"></i>
                    </div>
                    <div class="icon-button language-toggle" onclick="toggleLanguage()" title="Cambiar idioma / Change language">
                        <span id="language-text">EN</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Summary Section -->
        <section class="summary-section">
            <h2 id="summary-title">Professional Summary</h2>
            <div id="summary-carousel" class="carousel">
                <!-- Summary items will be generated by JavaScript -->
            </div>
            <div class="carousel-controls">
                <button class="carousel-btn prev" onclick="prevSummary()">←</button>
                <span class="carousel-indicator" id="summary-indicator">1 / 5</span>
                <button class="carousel-btn next" onclick="nextSummary()">→</button>
            </div>
        </section>

        <!-- Experience Section -->
        <section class="experience-section">
            <h2 id="experience-title">Experience</h2>
            <div class="swiper experience-swiper">
                <div class="swiper-wrapper" id="experience-carousel">
                    <!-- Experience items will be generated by JavaScript -->
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </section>

        <!-- Education Section -->
        <section class="education-section">
            <h2 id="education-title">Education</h2>
            <div id="education-list" class="education-list">
                <!-- Education items will be generated by JavaScript -->
            </div>
        </section>

        <!-- Skills Section -->
        <section class="skills-section">
            <h2 id="skills-title">Skills</h2>
            <div id="skills-list" class="skills-list">
                <!-- Skills will be generated by JavaScript -->
            </div>
        </section>

        <!-- Certifications Section -->
        <section class="certifications-section">
            <h2 id="certifications-title">Certifications & Licenses</h2>
            <div id="certifications-list" class="certifications-list">
                <!-- Certifications will be generated by JavaScript -->
            </div>
        </section>

        <!-- Languages Section -->
        <section class="languages-section">
            <h2 id="languages-title">Languages</h2>
            <div id="languages-list" class="languages-list">
                <!-- Languages will be generated by JavaScript -->
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
